services:
  web:
    image: node:22-alpine
    container_name: evo-web
    working_dir: /app
    command: sh -c "corepack enable && yarn install && yarn workspace @evo/web dev --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "5174:5173"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_web:/app/packages/web/node_modules
      - node_modules_api:/app/packages/api/node_modules
      - yarn_state:/app/.yarn

volumes:
  node_modules_root:
  node_modules_web:
  node_modules_api:
  yarn_state:
